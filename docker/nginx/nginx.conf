# nginx.conf — 生产级反向代理配置（server-deployment.md §4）
# 挂载路径：/etc/nginx/nginx.conf

worker_processes auto;

events {
  worker_connections 1024;
  use epoll;
  multi_accept on;
}

http {
  include      /etc/nginx/mime.types;
  default_type application/octet-stream;

  # ── 日志格式 ─────────────────────────────────────────────────
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';
  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;

  # ── 基础性能 ──────────────────────────────────────────────────
  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout 65;
  server_tokens   off;   # 隐藏 nginx 版本号

  # ── 静态资源压缩 ──────────────────────────────────────────────
  gzip              on;
  gzip_vary         on;
  gzip_proxied      any;
  gzip_comp_level   6;
  gzip_min_length   1024;
  gzip_types text/plain text/css text/xml text/javascript
             application/json application/javascript application/xml+rss
             application/atom+xml image/svg+xml;

  # ── 上游 Node.js 服务 ─────────────────────────────────────────
  upstream risk_backend {
    server risk-agent-server:4100;
    keepalive 64;
  }

  # ── HTTP 服务（开发/内网；生产环境改为仅重定向到 HTTPS）──────
  server {
    listen 80;
    server_name _;

    # ── 安全响应头 ──────────────────────────────────────────────
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # React SPA — 静态资源
    location / {
      root /usr/share/nginx/html;
      index index.html;
      try_files $uri $uri/ /index.html;

      # 静态资源长期缓存
      location ~* \.(js|css|png|ico|woff2|woff|ttf|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
      }
    }

    # 健康检查端点直接代理
    location = /health {
      proxy_pass http://risk_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      access_log off;
    }

    # API 代理
    location /api/ {
      proxy_pass http://risk_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 300s;   # Agent 任务可能耗时较长
      proxy_buffering off;       # SSE / 流式响应不缓冲
    }

    # WebSocket 代理（Agent 进度推送）
    location /api/ws/ {
      proxy_pass http://risk_backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }
  }

  # ── HTTPS（生产环境，配置 SSL 证书后取消注释）────────────────
  # server {
  #   listen 443 ssl http2;
  #   server_name risk-agent.example.com;
  #
  #   ssl_certificate     /etc/nginx/ssl/cert.pem;
  #   ssl_certificate_key /etc/nginx/ssl/key.pem;
  #   ssl_protocols       TLSv1.2 TLSv1.3;
  #   ssl_ciphers         HIGH:!aNULL:!MD5;
  #   ssl_session_cache   shared:SSL:10m;
  #   ssl_session_timeout 10m;
  #
  #   add_header X-Frame-Options SAMEORIGIN always;
  #   add_header X-Content-Type-Options nosniff always;
  #   add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  #   add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  #
  #   location / { ... }      # 同上 HTTP server 块中的配置
  #   location /api/ { ... }
  #   location /api/ws/ { ... }
  # }
}
