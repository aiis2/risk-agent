name: release-desktop

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (tag name, e.g. v0.2.0)'
        required: false
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: windows-portable
            package_command: node scripts/build-desktop-portable.mjs --skip-build
            signing_platform: windows
          - os: macos-latest
            artifact_name: macos
            package_command: pnpm build:mac
            signing_platform: macos
          - os: ubuntu-latest
            artifact_name: linux
            package_command: pnpm build:linux
            signing_platform: none
    runs-on: ${{ matrix.os }}
    env:
      WINDOWS_SIGNING_ENABLED: ${{ secrets.WIN_CSC_LINK != '' }}
      MACOS_SIGNING_ENABLED: ${{ secrets.MAC_CSC_LINK != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: |
          pnpm --filter @risk-agent/core build
          pnpm --filter @risk-agent/server build
          pnpm --filter @risk-agent/web build
          pnpm --filter @risk-agent/desktop build

      - name: Package desktop (unsigned)
        if: >-
          matrix.signing_platform == 'none' ||
          (matrix.signing_platform == 'windows' && env.WINDOWS_SIGNING_ENABLED != 'true') ||
          (matrix.signing_platform == 'macos' && env.MACOS_SIGNING_ENABLED != 'true')
        run: ${{ matrix.package_command }}
        env:
          DEBUG: electron-builder
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Package desktop (signed Windows)
        if: matrix.signing_platform == 'windows' && env.WINDOWS_SIGNING_ENABLED == 'true'
        run: ${{ matrix.package_command }}
        env:
          DEBUG: electron-builder
          CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: Package desktop (signed macOS)
        if: matrix.signing_platform == 'macos' && env.MACOS_SIGNING_ENABLED == 'true'
        run: ${{ matrix.package_command }}
        env:
          DEBUG: electron-builder
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Validate packaged desktop
        run: node scripts/validate-desktop-release-artifacts.mjs

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: risk-agent-${{ matrix.artifact_name }}
          path: |
            tmp/npm-desktop-stage-*/release/*.exe
            packages/desktop/release/*.exe
            packages/desktop/release/*.dmg
            packages/desktop/release/*.zip
            packages/desktop/release/*.AppImage
            packages/desktop/release/*.deb
          if-no-files-found: error
          retention-days: 14
