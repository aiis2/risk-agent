name: release-desktop

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (tag name, e.g. v0.2.0)'
        required: false
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    env:
      # 统一把 GitHub secrets 映射为 electron-builder 识别的变量
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile=false

      - name: Build core/server/web
        run: |
          pnpm --filter @risk-agent/core build
          pnpm --filter @risk-agent/server build
          pnpm --filter @risk-agent/web build

      - name: Build desktop (signed if secrets present)
        run: pnpm --filter @risk-agent/desktop build
        env:
          # electron-builder 会根据 CSC_LINK 自动决定是否签名
          DEBUG: electron-builder

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: risk-agent-${{ matrix.os }}
          path: |
            packages/desktop/release/**/*.exe
            packages/desktop/release/**/*.dmg
            packages/desktop/release/**/*.zip
            packages/desktop/release/**/*.AppImage
            packages/desktop/release/**/*.deb
          if-no-files-found: warn
